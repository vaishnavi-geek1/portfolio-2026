<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Faceless female avatar</title>
  <desc id="desc">Clean flat illustration of a woman with shoulder length hair and no facial features.</desc>

  <!-- soft circular background -->
  <circle cx="256" cy="256" r="200" fill="#e0f2fe" />

  <!-- hair back shape -->
  <path
    d="M150 360c0-96 40-176 106-176s106 80 106 176c0 32-12 60-30 80H180c-18-20-30-48-30-80z"
    fill="#7c2d12"
  />

  <!-- face -->
  <ellipse cx="256" cy="210" rx="82" ry="102" fill="#fed7aa" />

  <!-- front hair layers -->
  <path
    d="M190 210c0-52 30-94 66-94s66 42 66 94c0 40-16 78-40 102-8 8-16 12-26 12s-18-4-26-12c-24-24-40-62-40-102z"
    fill="#9a3412"
  />

  <!-- neck -->
  <path
    d="M228 280c4 24 12 44 28 44s24-20 28-44c-8 4-18 6-28 6s-20-2-28-6z"
    fill="#fdba74"
  />

  <!-- shoulders / top -->
  <path
    d="M176 392c16-40 44-64 80-64s64 24 80 64v40H176v-40z"
    fill="#0f172a"
  />
</svg>

